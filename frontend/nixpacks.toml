# Nixpacks configuration for Railway deployment
# Builds the frontend (Node/Vite) then starts the Bun backend.
# The backend serves both the API and the built static frontend.

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps",
  "cd backend && bun install",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && bun run index.js"
