# Nixpacks configuration for Railway deployment
# Requires: Node.js (frontend build) + Bun (backend)

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps",
  "cd backend && bun install",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && bun run index.js"
